      responses:
        '200': { description: Stored, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [chats]
      summary: Remove a favorite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chatType, chatId]
              properties:
                chatType: { type: string, enum: [private, group] }
                chatId: { type: string, format: uuid }
      responses:
        '200': { description: Removed, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /notifications:
    get:
      tags: [notifications]
      summary: List notifications with unread count
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50, maximum: 100 } }
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          notifications:
                            type: array
                            items: { $ref: '#/components/schemas/Notification' }
                          unreadCount: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /notifications/read:
    post:
      tags: [notifications]
      summary: Mark one notification (by id) or all read
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: [string, 'null'], format: uuid }
      responses:
        '200': { description: Marked read, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /feedback:
    get:
      tags: [feedback]
      summary: List feedback & suggestions (newest first, cursor-paginated)
      parameters:
        - { name: cursor, in: query, required: false, schema: { type: string }, description: createdAt of the last seen item (RFC3339). }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 20, maximum: 50 } }
      responses:
        '200':
          description: A page of feedback
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          items: { type: array, items: { $ref: '#/components/schemas/Feedback' } }
                          nextCursor: { type: [string, 'null'] }
                          hasMore: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [feedback]
      summary: Submit feedback (any authenticated user)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, minLength: 1, maxLength: 2000 }
      responses:
        '201':
          description: Feedback created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          feedback: { $ref: '#/components/schemas/Feedback' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /feedback/{id}:
    delete:
      tags: [feedback]
      summary: Delete feedback (CEO only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Deleted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /notes:
    get:
      tags: [notes]
      summary: List the current user's personal notes (newest first)
      responses:
        '200': { description: Notes, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [notes]
      summary: Create a text-only note
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [text], properties: { text: { type: string, minLength: 1, maxLength: 10000 } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /notes/file:
    post:
      tags: [notes]
      summary: Create a note carrying a file (raw body; X-File-Name and optional X-Note-Text headers)
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { description: File too large }
  /notes/{id}:
    delete:
      tags: [notes]
      summary: Delete one of your own notes (owner only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Deleted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /notes/{id}/file:
    get:
      tags: [notes]
      summary: Download a note's attached file (owner only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: File bytes, content: { application/octet-stream: { schema: { type: string, format: binary } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /conditions:
    get:
      tags: [conditions]
      summary: List all nine promotion rules (CEO only)
      responses:
        '200': { description: Rules, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
