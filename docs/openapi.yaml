openapi: 3.1.0
info:
  title: KISY Enterprise Messenger API
  version: 0.6.0
  description: >
    REST API for the KISY enterprise messenger. Covers stages 2–4:
    authentication, access control, invitations, profile, groups, private
    chats, messages, reactions, read state, favorites, notifications, the
    CEO admin surface and the WebSocket gateway. File handling is added in a
    later stage.
servers:
  - url: /api/v1
    description: Versioned API root (behind the Nginx edge proxy)

tags:
  - name: auth
    description: Authentication and session lifecycle
  - name: users
    description: Current user's profile
  - name: invitations
    description: CEO-issued registration tokens
  - name: groups
    description: Group chats with clearance-gated visibility
  - name: chats
    description: One-to-one private conversations
  - name: boards
    description: Trello-style task boards attached to groups
  - name: messages
    description: Chat messages (editing disabled by design)
  - name: notifications
    description: Per-user notifications (@mentions)
  - name: admin
    description: CEO administration (users, roles, credentials, audit)
  - name: websocket
    description: Real-time gateway

paths:
  /auth/register:
    post:
      tags: [auth]
      summary: Register using an invitation token
      description: >
        Redeems a single-use invitation token (120s lifetime) and creates
        an account at the lowest clearance level, then opens the first
        session (sets auth cookies).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inviteToken, username, password]
              properties:
                inviteToken:
                  type: string
                username:
                  type: string
                  pattern: '^[A-Za-z0-9_]{3,32}$'
                password:
                  type: string
                  minLength: 12
                  maxLength: 128
      responses:
        '201':
          description: Account created, session opened
          headers:
            Set-Cookie:
              description: kisy_access and kisy_refresh HTTPOnly cookies
              schema: { type: string }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/login:
    post:
      tags: [auth]
      summary: Authenticate and open a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Authenticated, session opened
          headers:
            Set-Cookie:
              description: kisy_access and kisy_refresh HTTPOnly cookies
              schema: { type: string }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429':
          description: Rate limited or account temporarily locked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }

  /auth/refresh:
    post:
      tags: [auth]
      summary: Rotate the refresh token
      description: >
        Exchanges the current refresh cookie for a new access+refresh pair
        (refresh token rotation). Replaying a rotated token revokes the
        session (theft detection).
      security:
        - refreshCookie: []
      responses:
        '200':
          description: Tokens rotated
          headers:
            Set-Cookie:
              description: fresh kisy_access and kisy_refresh cookies
              schema: { type: string }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          accessExpiresAt: { type: string, format: date-time }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [auth]
      summary: Invalidate the current session
      responses:
        '200':
          description: Logged out; cookies cleared
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout-all:
    post:
      tags: [auth]
      summary: Invalidate every active session of the user
      responses:
        '200':
          description: All sessions revoked; cookies cleared
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          revokedSessions: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/password:
    post:
      tags: [auth]
      summary: Change the current user's password
      description: >
        Verifies the current password, stores the new hash and revokes all
        other sessions of the user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string }
                newPassword:
                  type: string
                  minLength: 12
                  maxLength: 128
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /users/me:
    get:
      tags: [users]
      summary: Return the current user's profile
      responses:
        '200':
          description: Current profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [users]
      summary: Update the current user's username
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  pattern: '^[A-Za-z0-9_]{3,32}$'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }

  /invites:
    post:
      tags: [invitations]
      summary: Generate an invitation token (CEO only)
      description: >
        Requires clearance level 1. Returns a single-use token valid for
        120 seconds; the plaintext token is shown only in this response.
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Invitation' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /users/directory:
    get:
      tags: [users]
      summary: Search users you may start a chat with (same or lower clearance)
      parameters:
        - { name: search, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 25, maximum: 50 } }
      responses:
        '200':
          description: Matching users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          users:
                            type: array
                            items: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /groups:
    get:
      tags: [groups]
      summary: List groups visible to the current clearance
      responses:
        '200':
          description: Visible groups (min_role_level >= actor level)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          groups:
                            type: array
                            items: { $ref: '#/components/schemas/Group' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [groups]
      summary: Create a group
      description: >
        Any authenticated user may create a group, but its minimum clearance
        cannot be stronger than the creator's own (minRoleLevel must be >=
        the creator's role level). The creator becomes the group founder.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, minRoleLevel]
              properties:
                name: { type: string, minLength: 1, maxLength: 128 }
                description: { type: [string, 'null'] }
                minRoleLevel: { type: integer, minimum: 1, maximum: 10 }
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          group: { $ref: '#/components/schemas/Group' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Requested clearance is stronger than the creator's own
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }

  /groups/{groupID}:
    get:
      tags: [groups]
      summary: Get a visible group
      parameters:
        - { name: groupID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Group
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          group: { $ref: '#/components/schemas/Group' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [groups]
      summary: Delete a group (CEO or founder)
      description: >
        The CEO may delete any group; otherwise only the group's founder may
        delete it. Cascades to members, the task board and group messages. A
        group hidden from the caller's clearance returns 404 (not 403).
      parameters:
        - { name: groupID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Deleted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /groups/{groupID}/members:
    post:
      tags: [groups]
      summary: Add a member to a group
      parameters:
        - { name: groupID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: string, format: uuid }
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /groups/{groupID}/members:
    get:
      tags: [groups]
      summary: List a group's members (visible to members)
      parameters:
        - { name: groupID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Members
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          members: { type: array, items: { $ref: '#/components/schemas/User' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /groups/{groupID}/board:
    get:
      tags: [boards]
      summary: Get the group's task board (404 if not created yet)
      parameters:
        - { name: groupID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Board with columns and cards
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          board: { $ref: '#/components/schemas/Board' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [boards]
      summary: Create the task board (group founder only)
      description: Seeds three default columns. Only the group's founder may create it.
      parameters:
        - { name: groupID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: { title: { type: string } }
      responses:
        '201':
          description: Board created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          board: { $ref: '#/components/schemas/Board' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /boards/{boardID}/columns:
    post:
      tags: [boards]
      summary: Add a column (founder only)
      parameters:
        - { name: boardID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [title], properties: { title: { type: string } } }
      responses:
        '200': { description: Column added, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }

  /boards/columns/{columnID}:
    patch:
      tags: [boards]
      summary: Rename a column (founder only)
      parameters:
        - { name: columnID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [title], properties: { title: { type: string } } }
      responses:
        '200': { description: Renamed, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [boards]
      summary: Delete a column and its cards (founder only)
      parameters:
        - { name: columnID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Deleted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }

  /boards/columns/{columnID}/cards:
    post:
      tags: [boards]
      summary: Create a card in a column (any group member)
      parameters:
        - { name: columnID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CardInput' }
      responses:
        '201':
          description: Card created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties: { card: { $ref: '#/components/schemas/BoardCard' } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /boards/cards/{cardID}:
    patch:
      tags: [boards]
      summary: Update a card (any group member)
      parameters:
        - { name: cardID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CardInput' }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [boards]
      summary: Delete a card (creator or founder)
      parameters:
        - { name: cardID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Deleted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /boards/cards/{cardID}/move:
    post:
      tags: [boards]
      summary: Move a card to a column and index (drag-and-drop)
      parameters:
        - { name: cardID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [columnId, index]
              properties:
                columnId: { type: string, format: uuid }
                index: { type: integer, minimum: 0 }
      responses:
        '200': { description: Moved, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /chats:
    get:
      tags: [chats]
      summary: List the current user's private chats
      responses:
        '200':
          description: Private chats
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          chats:
                            type: array
                            items: { $ref: '#/components/schemas/Chat' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [chats]
      summary: Open (or fetch) a private chat with another user
      description: >
        Idempotent. Enforces the initiation rule: a user may open a chat
        only with same-or-lower clearance; the existing chat is returned if
        one already exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: string, format: uuid }
      responses:
        '200':
          description: Chat opened or already existed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          chat: { $ref: '#/components/schemas/Chat' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /chats/{chatID}:
    get:
      tags: [chats]
      summary: Get a private chat the user participates in
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Chat
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          chat: { $ref: '#/components/schemas/Chat' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /messages:
    post:
      tags: [messages]
      summary: Send a message to a chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chatType, chatId, text]
              properties:
                chatType: { type: string, enum: [private, group] }
                chatId: { type: string, format: uuid }
                text: { type: string, minLength: 1, maxLength: 8000 }
                replyTo: { type: [string, 'null'], format: uuid }
      responses:
        '201':
          description: Message created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          message: { $ref: '#/components/schemas/Message' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    get:
      tags: [messages]
      summary: List messages of a chat (cursor pagination, newest first)
      parameters:
        - { name: chatType, in: query, required: true, schema: { type: string, enum: [private, group] } }
        - { name: chatId, in: query, required: true, schema: { type: string, format: uuid } }
        - { name: cursor, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50, maximum: 200 } }
      responses:
        '200':
          description: A page of messages
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/MessagePage' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /messages/{messageID}:
    delete:
      tags: [messages]
      summary: Delete a message
      description: >
        The sender may delete their own message; the CEO may delete any
        message. Deletion is a tombstone — the timeline slot remains but
        the text is cleared.
      parameters:
        - { name: messageID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /ws:
    get:
      tags: [websocket]
      summary: Upgrade to the real-time WebSocket connection
      description: >
        Authenticated via the kisy_access cookie or an `access_token` query
        parameter. After the upgrade, the client and server exchange JSON
        frames.

        Client→Server `type`: message.send, typing.start, typing.stop,
        presence.subscribe, read.confirmation.

        Server→Client `event`: message.created, message.deleted,
        message.read, typing.started, typing.stopped, user.online,
        user.offline, error.
      parameters:
        - { name: access_token, in: query, required: false, schema: { type: string } }
      responses:
        '101': { description: Switching Protocols (WebSocket) }
        '401': { description: Authentication required or failed }

  /messages/{messageID}/reactions:
    post:
      tags: [messages]
      summary: Add an emoji reaction (idempotent)
      parameters:
        - { name: messageID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji: { type: string, maxLength: 32 }
      responses:
        '200': { description: Reaction added, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [messages]
      summary: Remove your emoji reaction
      parameters:
        - { name: messageID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji: { type: string, maxLength: 32 }
      responses:
        '200': { description: Reaction removed, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /read:
    post:
      tags: [messages]
      summary: Mark a chat read up to a message (updates unread counters)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chatType, chatId, messageId]
              properties:
                chatType: { type: string, enum: [private, group] }
                chatId: { type: string, format: uuid }
                messageId: { type: string, format: uuid }
      responses:
        '200': { description: Read position stored, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /favorites:
    get:
      tags: [chats]
      summary: List favorite/pinned chats
      responses:
        '200':
          description: Favorites, pinned first
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          favorites:
                            type: array
                            items: { $ref: '#/components/schemas/Favorite' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      tags: [chats]
      summary: Add or update a favorite/pin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chatType, chatId]
              properties:
                chatType: { type: string, enum: [private, group] }
                chatId: { type: string, format: uuid }
                isPinned: { type: boolean }
                pinnedOrder: { type: [integer, 'null'] }
      responses:
        '200': { description: Stored, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [chats]
      summary: Remove a favorite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chatType, chatId]
              properties:
                chatType: { type: string, enum: [private, group] }
                chatId: { type: string, format: uuid }
      responses:
        '200': { description: Removed, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /notifications:
    get:
      tags: [notifications]
      summary: List notifications with unread count
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50, maximum: 100 } }
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          notifications:
                            type: array
                            items: { $ref: '#/components/schemas/Notification' }
                          unreadCount: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /notifications/read:
    post:
      tags: [notifications]
      summary: Mark one notification (by id) or all read
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: [string, 'null'], format: uuid }
      responses:
        '200': { description: Marked read, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/users:
    get:
      tags: [admin]
      summary: List accounts (CEO only)
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: offset, in: query, required: false, schema: { type: integer, default: 0 } }
      responses:
        '200':
          description: Users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          users:
                            type: array
                            items: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/users/{userID}/role:
    patch:
      tags: [admin]
      summary: Change a user's clearance level (CEO only)
      parameters:
        - { name: userID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roleLevel]
              properties:
                roleLevel: { type: integer, minimum: 1, maximum: 10 }
      responses:
        '200': { description: Role changed, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/users/{userID}/reset-password:
    post:
      tags: [admin]
      summary: Reset a user's password (CEO only); revokes their sessions
      parameters:
        - { name: userID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                newPassword: { type: string, minLength: 12, maxLength: 128 }
      responses:
        '200': { description: Password reset, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/users/{userID}/activate:
    post:
      tags: [admin]
      summary: Activate a user (CEO only)
      parameters:
        - { name: userID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Activated, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/users/{userID}/deactivate:
    post:
      tags: [admin]
      summary: Deactivate a user (CEO only); revokes their sessions
      parameters:
        - { name: userID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Deactivated, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/audit:
    get:
      tags: [admin]
      summary: Read the audit log (CEO only)
      parameters:
        - { name: action, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50 } }
        - { name: offset, in: query, required: false, schema: { type: integer, default: 0 } }
      responses:
        '200':
          description: Audit entries, newest first
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          entries:
                            type: array
                            items: { $ref: '#/components/schemas/AuditEntry' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    accessCookie:
      type: apiKey
      in: cookie
      name: kisy_access
    refreshCookie:
      type: apiKey
      in: cookie
      name: kisy_refresh
  security:
    - accessCookie: []

  schemas:
    Envelope:
      type: object
      required: [success, requestId, timestamp]
      properties:
        success: { type: boolean }
        data: { type: object }
        error: { $ref: '#/components/schemas/Error' }
        requestId: { type: string }
        timestamp: { type: string, format: date-time }
    Error:
      type: object
      properties:
        code:
          type: string
          enum:
            - AUTH_INVALID_TOKEN
            - AUTH_INVALID_CREDENTIALS
            - AUTH_EXPIRED
            - ACCESS_DENIED
            - RESOURCE_NOT_FOUND
            - RATE_LIMITED
            - VALIDATION_FAILED
            - INTERNAL_ERROR
        message: { type: string }
        details: {}
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        displayName: { type: string }
        roleLevel: { type: integer, minimum: 1, maximum: 10 }
        avatarUrl: { type: [string, 'null'] }
        status: { type: string, enum: [online, offline, away] }
        isActive: { type: boolean }
        lastSeen: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
    Invitation:
      type: object
      properties:
        token: { type: string }
        creatorId: { type: string, format: uuid }
        expiresAt: { type: string, format: date-time }
    Group:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: [string, 'null'] }
        avatarUrl: { type: [string, 'null'] }
        minRoleLevel: { type: integer, minimum: 1, maximum: 10 }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
    BoardCard:
      type: object
      properties:
        id: { type: string, format: uuid }
        columnId: { type: string, format: uuid }
        title: { type: string }
        description: { type: [string, 'null'] }
        position: { type: integer }
        assigneeId: { type: [string, 'null'], format: uuid }
        label: { type: [string, 'null'] }
        dueDate: { type: [string, 'null'], format: date-time }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
    BoardColumn:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        position: { type: integer }
        cards: { type: array, items: { $ref: '#/components/schemas/BoardCard' } }
    Board:
      type: object
      properties:
        id: { type: string, format: uuid }
        groupId: { type: string, format: uuid }
        title: { type: string }
        createdBy: { type: string, format: uuid }
        columns: { type: array, items: { $ref: '#/components/schemas/BoardColumn' } }
    CardInput:
      type: object
      required: [title]
      properties:
        title: { type: string, maxLength: 256 }
        description: { type: [string, 'null'] }
        assigneeId: { type: [string, 'null'], format: uuid }
        label: { type: [string, 'null'] }
        dueDate: { type: [string, 'null'], format: date-time }
    Chat:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [private] }
        otherUserId: { type: string, format: uuid }
        otherUser: { oneOf: [{ $ref: '#/components/schemas/User' }, { type: 'null' }] }
        unreadCount: { type: integer }
        createdAt: { type: string, format: date-time }
    Message:
      type: object
      properties:
        id: { type: string, format: uuid }
        chatId: { type: string, format: uuid }
        chatType: { type: string, enum: [private, group] }
        senderId: { type: string, format: uuid }
        text: { type: [string, 'null'] }
        replyTo: { type: [string, 'null'], format: uuid }
        attachments: { type: array, items: {} }
        reactions:
          type: array
          items: { $ref: '#/components/schemas/ReactionSummary' }
        mentions: { type: array, items: {} }
        isDeleted: { type: boolean }
        createdAt: { type: string, format: date-time }
        deletedAt: { type: [string, 'null'], format: date-time }
    MessagePage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Message' }
        nextCursor: { type: string }
        hasMore: { type: boolean }
    ReactionSummary:
      type: object
      properties:
        emoji: { type: string }
        count: { type: integer }
        reacted: { type: boolean }
    Favorite:
      type: object
      properties:
        chatType: { type: string, enum: [private, group] }
        chatId: { type: string, format: uuid }
        isPinned: { type: boolean }
        pinnedOrder: { type: [integer, 'null'] }
    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string }
        payload: { type: object }
        isRead: { type: boolean }
        createdAt: { type: string, format: date-time }
    AuditEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        actorId: { type: [string, 'null'], format: uuid }
        action: { type: string }
        targetType: { type: [string, 'null'] }
        targetId: { type: [string, 'null'], format: uuid }
        requestId: { type: [string, 'null'] }
        metadata: { type: object }
        createdAt: { type: string, format: date-time }

  responses:
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    Unauthorized:
      description: Authentication required or failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    Forbidden:
      description: Insufficient clearance
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    NotFound:
      description: Resource not found (or hidden from this clearance)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    Conflict:
      description: Resource conflict (e.g. username taken)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }

security:
  - accessCookie: []
