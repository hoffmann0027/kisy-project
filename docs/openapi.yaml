      responses:
        '200': { description: Polls, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [voting]
      summary: Create a poll (CEO only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question, options]
              properties:
                question: { type: string, minLength: 1, maxLength: 500 }
                options: { type: array, minItems: 2, maxItems: 10, items: { type: string, maxLength: 200 } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /polls/options/{optionID}/vote:
    post:
      tags: [voting]
      summary: Cast or change your vote (any user; poll must be open)
      parameters:
        - { name: optionID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Voted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Poll is closed }
  /polls/{id}/close:
    post:
      tags: [voting]
      summary: Close a poll and record its tally in the audit log (CEO only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Closed, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /polls/{id}:
    delete:
      tags: [voting]
      summary: Delete a poll and its votes (CEO only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Deleted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /rating/board:
    get:
      tags: [rating]
      summary: Full rating board (projects with tasks embedded)
      responses:
        '200':
          description: Board
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          projects: { type: array, items: { $ref: '#/components/schemas/RatingProject' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /rating/analytics:
    get:
      tags: [rating]
      summary: Profit analytics (per-project share + monthly totals)
      responses:
        '200':
          description: Analytics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/RatingAnalytics' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /rating/export.csv:
    get:
      tags: [rating]
      summary: Download the profit ledger as CSV
      responses:
        '200':
          description: CSV file (UTF-8 with BOM)
          content:
            text/csv:
              schema: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /rating/projects:
    post:
      tags: [rating]
      summary: Create a project (CEO only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string, minLength: 1, maxLength: 128 }
                description: { type: [string, 'null'] }
                difficulty: { type: string, enum: [easy, medium, hard] }
                minLevel: { type: integer, minimum: 1, maximum: 10, description: Access level; users of clearance L see it when L <= minLevel. }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /rating/projects/{id}:
    delete:
      tags: [rating]
      summary: Delete a project and its tasks/ledger (CEO only)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Deleted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /rating/projects/{id}/level:
    patch:
      tags: [rating]
      summary: Change a project's access level at any stage (CEO only)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [minLevel], properties: { minLevel: { type: integer, minimum: 1, maximum: 10 } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /rating/projects/{id}/tasks:
    post:
      tags: [rating]
      summary: Add a task to a project (CEO only)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [title], properties: { title: { type: string, minLength: 1, maxLength: 200 } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /rating/tasks/{id}/assign:
    post:
      tags: [rating]
      summary: Assign yourself to a backlog task (moves it to in progress)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Assigned, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
  /rating/tasks/{id}/progress:
    patch:
      tags: [rating]
      summary: Update task progress (assignee only; 100 → done)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [progress], properties: { progress: { type: integer, minimum: 0, maximum: 100 } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /rating/tasks/{id}/return:
    post:
      tags: [rating]
      summary: Return an in-progress task to the backlog (assignee or CEO)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Returned, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /rating/tasks/{id}:
    delete:
      tags: [rating]
      summary: Delete a task at any stage (CEO only)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Deleted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /rating/projects/{id}/finance:
    post:
      tags: [rating]
      summary: Record income/expense against a project's profit ledger (CEO only; EUR cents)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                incomeKopecks: { type: integer, format: int64, minimum: 0, description: Euro cents. }
                expenseKopecks: { type: integer, format: int64, minimum: 0, description: Euro cents. }
                note: { type: [string, 'null'] }
      responses:
        '201': { description: Recorded, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/users:
    get:
      tags: [admin]
      summary: List accounts (CEO only)
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: offset, in: query, required: false, schema: { type: integer, default: 0 } }
      responses:
        '200':
          description: Users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          users:
                            type: array
                            items: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/users/{userID}/role:
    patch:
      tags: [admin]
      summary: Change a user's clearance level (CEO only)
      parameters:
        - { name: userID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roleLevel]
              properties:
                roleLevel: { type: integer, minimum: 1, maximum: 10 }
      responses:
        '200': { description: Role changed, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/users/{userID}/reset-password:
    post:
      tags: [admin]
      summary: Reset a user's password (CEO only); revokes their sessions
      parameters:
        - { name: userID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                newPassword: { type: string, minLength: 12, maxLength: 128 }
      responses:
        '200': { description: Password reset, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/users/{userID}/activate:
    post:
      tags: [admin]
      summary: Activate a user (CEO only)
      parameters:
        - { name: userID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Activated, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/users/{userID}/deactivate:
    post:
      tags: [admin]
      summary: Deactivate a user (CEO only); revokes their sessions
      parameters:
        - { name: userID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Deactivated, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/audit:
    get:
      tags: [admin]
      summary: Read the audit log (CEO only)
      parameters:
        - { name: action, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50 } }
        - { name: offset, in: query, required: false, schema: { type: integer, default: 0 } }
      responses:
        '200':
          description: Audit entries, newest first
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          entries:
                            type: array
                            items: { $ref: '#/components/schemas/AuditEntry' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    accessCookie:
      type: apiKey
      in: cookie
      name: kisy_access
    refreshCookie:
      type: apiKey
      in: cookie
      name: kisy_refresh
  security:
    - accessCookie: []

  schemas:
    Envelope:
      type: object
      required: [success, requestId, timestamp]
      properties:
        success: { type: boolean }
        data: { type: object }
        error: { $ref: '#/components/schemas/Error' }
        requestId: { type: string }
        timestamp: { type: string, format: date-time }
    Error:
      type: object
      properties:
        code:
          type: string
          enum:
            - AUTH_INVALID_TOKEN
            - AUTH_INVALID_CREDENTIALS
            - AUTH_EXPIRED
            - ACCESS_DENIED
            - RESOURCE_NOT_FOUND
            - RATE_LIMITED
            - VALIDATION_FAILED
            - INTERNAL_ERROR
        message: { type: string }
        details: {}
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        displayName: { type: string }
        roleLevel: { type: integer, minimum: 1, maximum: 10 }
        avatarUrl: { type: [string, 'null'] }
        status: { type: string, enum: [online, offline, away] }
        isActive: { type: boolean }
        lastSeen: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
    Invitation:
      type: object
      properties:
        token: { type: string }
        creatorId: { type: string, format: uuid }
        expiresAt: { type: string, format: date-time }
    Group:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: [string, 'null'] }
        avatarUrl: { type: [string, 'null'] }
        minRoleLevel: { type: integer, minimum: 1, maximum: 10 }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
    BoardCard:
      type: object
      properties:
        id: { type: string, format: uuid }
        columnId: { type: string, format: uuid }
        title: { type: string }
        description: { type: [string, 'null'] }
        position: { type: integer }
        assigneeId: { type: [string, 'null'], format: uuid }
        label: { type: [string, 'null'] }
        dueDate: { type: [string, 'null'], format: date-time }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
    BoardColumn:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        position: { type: integer }
        cards: { type: array, items: { $ref: '#/components/schemas/BoardCard' } }
    Board:
      type: object
      properties:
        id: { type: string, format: uuid }
        groupId: { type: string, format: uuid }
        title: { type: string }
        createdBy: { type: string, format: uuid }
        columns: { type: array, items: { $ref: '#/components/schemas/BoardColumn' } }
    CardInput:
      type: object
      required: [title]
      properties:
        title: { type: string, maxLength: 256 }
        description: { type: [string, 'null'] }
        assigneeId: { type: [string, 'null'], format: uuid }
        label: { type: [string, 'null'] }
        dueDate: { type: [string, 'null'], format: date-time }
    Chat:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [private] }
        otherUserId: { type: string, format: uuid }
        otherUser: { oneOf: [{ $ref: '#/components/schemas/User' }, { type: 'null' }] }
        unreadCount: { type: integer }
        otherLastReadAt:
          description: When the counterpart last read this chat (drives read receipts); null if never.
          oneOf: [{ type: string, format: date-time }, { type: 'null' }]
        createdAt: { type: string, format: date-time }
    Message:
      type: object
      properties:
        id: { type: string, format: uuid }
        chatId: { type: string, format: uuid }
        chatType: { type: string, enum: [private, group] }
        senderId: { type: string, format: uuid }
        text: { type: [string, 'null'] }
        replyTo: { type: [string, 'null'], format: uuid }
        attachments: { type: array, items: {} }
        reactions:
          type: array
          items: { $ref: '#/components/schemas/ReactionSummary' }
        mentions: { type: array, items: {} }
        isDeleted: { type: boolean }
        createdAt: { type: string, format: date-time }
        deletedAt: { type: [string, 'null'], format: date-time }
        editedAt: { type: [string, 'null'], format: date-time }
        pinnedAt: { type: [string, 'null'], format: date-time }
        readCount: { type: [integer, 'null'], description: For own group messages, recipients who have read it. }
        readTotal: { type: [integer, 'null'], description: For own group messages, total recipients. }
    MessagePage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Message' }
        nextCursor: { type: string }
        hasMore: { type: boolean }
    ReactionSummary:
      type: object
      properties:
        emoji: { type: string }
        count: { type: integer }
        reacted: { type: boolean }
    Favorite:
      type: object
      properties:
        chatType: { type: string, enum: [private, group] }
        chatId: { type: string, format: uuid }
        isPinned: { type: boolean }
        pinnedOrder: { type: [integer, 'null'] }
    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string }
        payload: { type: object }
        isRead: { type: boolean }
        createdAt: { type: string, format: date-time }
    Feedback:
      type: object
      properties:
        id: { type: string, format: uuid }
        body: { type: string }
        createdAt: { type: string, format: date-time }
        author:
          type: object
          properties:
            id: { type: string, format: uuid }
            displayName: { type: string }
            username: { type: string }
            avatarUrl: { type: [string, 'null'] }
            roleLevel: { type: integer }
    RatingTask:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        projectTitle: { type: string }
        title: { type: string }
        assignee:
          oneOf:
            - type: object
              properties:
                id: { type: string, format: uuid }
                displayName: { type: string }
                avatarUrl: { type: [string, 'null'] }
            - type: 'null'
        progress: { type: integer, minimum: 0, maximum: 100 }
        status: { type: string, enum: [backlog, in_progress, done] }
        totalProfitKopecks: { type: integer, format: int64 }
        createdAt: { type: string, format: date-time }
    RatingProject:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: [string, 'null'] }
        difficulty: { type: string, enum: [easy, medium, hard] }
        minLevel: { type: integer, minimum: 1, maximum: 10 }
        status: { type: string, enum: [active, done] }
        createdBy: { type: string, format: uuid }
        totalProfitKopecks: { type: integer, format: int64, description: Profit in euro cents. }
        tasks: { type: array, items: { $ref: '#/components/schemas/RatingTask' } }
        createdAt: { type: string, format: date-time }
    RatingAnalytics:
      type: object
      properties:
        perProject:
          type: array
          items:
            type: object
            properties:
              projectId: { type: string, format: uuid }
              title: { type: string }
              profitKopecks: { type: integer, format: int64 }
        monthly:
          type: array
          items:
            type: object
            properties:
              month: { type: string, example: "2026-01" }
              profitKopecks: { type: integer, format: int64 }
    AuditEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        actorId: { type: [string, 'null'], format: uuid }
        action: { type: string }
        targetType: { type: [string, 'null'] }
        targetId: { type: [string, 'null'], format: uuid }
        requestId: { type: [string, 'null'] }
        metadata: { type: object }
        createdAt: { type: string, format: date-time }

  responses:
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    Unauthorized:
      description: Authentication required or failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    Forbidden:
      description: Insufficient clearance
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    NotFound:
      description: Resource not found (or hidden from this clearance)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    Conflict:
      description: Resource conflict (e.g. username taken)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }

security:
  - accessCookie: []
