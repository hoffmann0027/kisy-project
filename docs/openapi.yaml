          application/json:
            schema: { type: object, required: [text], properties: { text: { type: string, minLength: 1, maxLength: 10000 } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
