        '200': { description: Deleted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /notes:
    get:
      tags: [notes]
      summary: List the current user's personal notes (newest first)
      responses:
        '200': { description: Notes, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [notes]
      summary: Create a text-only note
      requestBody:
