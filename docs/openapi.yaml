      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: File bytes, content: { application/octet-stream: { schema: { type: string, format: binary } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /conditions:
    get:
      tags: [conditions]
      summary: List all nine promotion rules (CEO only)
      responses:
        '200': { description: Rules, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /conditions/next:
    get:
      tags: [conditions]
      summary: The single rule for the caller's next level (null if already at the top)
      responses:
        '200': { description: Rule or null, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /conditions/{level}:
    put:
      tags: [conditions]
      summary: Upsert the rule for a target level 1..9 (CEO only)
      parameters:
        - { name: level, in: path, required: true, schema: { type: integer, minimum: 1, maximum: 9 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [body], properties: { body: { type: string, maxLength: 4000 } } }
      responses:
        '200': { description: Saved, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /polls:
    get:
      tags: [voting]
      summary: List all polls with options, tallies, voters and the caller's vote
      responses:
        '200': { description: Polls, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [voting]
      summary: Create a poll (CEO only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question, options]
              properties:
                question: { type: string, minLength: 1, maxLength: 500 }
                options: { type: array, minItems: 2, maxItems: 10, items: { type: string, maxLength: 200 } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /polls/options/{optionID}/vote:
    post:
      tags: [voting]
      summary: Cast or change your vote (any user; poll must be open)
      parameters:
        - { name: optionID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Voted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Poll is closed }
  /polls/{id}/close:
    post:
      tags: [voting]
      summary: Close a poll and record its tally in the audit log (CEO only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Closed, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /polls/{id}:
    delete:
      tags: [voting]
      summary: Delete a poll and its votes (CEO only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Deleted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /calls/ice-config:
    get:
      tags: [calls]
      summary: WebRTC ICE servers for the caller (STUN + ephemeral TURN credentials)
      description: >
        Returns an RTCConfiguration.iceServers array. TURN entries carry
        short-lived credentials derived from the coturn shared secret
        (username = "<expiry>:<userId>", credential = base64(HMAC-SHA1)); the
        secret itself never leaves the server. Rate-limited.
      responses:
        '200': { description: ICE configuration, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { description: Too many requests }
  /calls/history:
    get:
      tags: [calls]
      summary: The caller's call journal, newest first
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - { name: offset, in: query, required: false, schema: { type: integer, minimum: 0, default: 0 } }
      responses:
        '200': { description: Calls, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /rating/board:
    get:
      tags: [rating]
      summary: Full rating board (projects with tasks embedded)
      responses:
        '200':
          description: Board
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          projects: { type: array, items: { $ref: '#/components/schemas/RatingProject' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /rating/analytics:
    get:
      tags: [rating]
      summary: Profit analytics (per-project share + monthly totals)
      responses:
        '200':
          description: Analytics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/RatingAnalytics' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /rating/export.csv:
    get:
      tags: [rating]
      summary: Download the profit ledger as CSV
      responses:
        '200':
          description: CSV file (UTF-8 with BOM)
          content:
            text/csv:
              schema: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /rating/projects:
    post:
      tags: [rating]
      summary: Create a project (CEO only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string, minLength: 1, maxLength: 128 }
                description: { type: [string, 'null'] }
                difficulty: { type: string, enum: [easy, medium, hard] }
                minLevel: { type: integer, minimum: 1, maximum: 10, description: Access level; users of clearance L see it when L <= minLevel. }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /rating/projects/{id}:
    delete:
      tags: [rating]
      summary: Delete a project and its tasks/ledger (CEO only)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Deleted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /rating/projects/{id}/level:
    patch:
      tags: [rating]
      summary: Change a project's access level at any stage (CEO only)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [minLevel], properties: { minLevel: { type: integer, minimum: 1, maximum: 10 } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /rating/projects/{id}/tasks:
    post:
      tags: [rating]
      summary: Add a task to a project (CEO only)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [title], properties: { title: { type: string, minLength: 1, maxLength: 200 } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /rating/tasks/{id}/assign:
    post:
      tags: [rating]
      summary: Assign yourself to a backlog task (moves it to in progress)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Assigned, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
  /rating/tasks/{id}/progress:
    patch:
      tags: [rating]
      summary: Update task progress (assignee only; 100 → done)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [progress], properties: { progress: { type: integer, minimum: 0, maximum: 100 } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /rating/tasks/{id}/return:
    post:
      tags: [rating]
      summary: Return an in-progress task to the backlog (assignee or CEO)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Returned, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /rating/tasks/{id}:
    delete:
      tags: [rating]
      summary: Delete a task at any stage (CEO only)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Deleted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /rating/projects/{id}/finance:
    post:
      tags: [rating]
      summary: Record income/expense against a project's profit ledger (CEO only; EUR cents)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                incomeKopecks: { type: integer, format: int64, minimum: 0, description: Euro cents. }
                expenseKopecks: { type: integer, format: int64, minimum: 0, description: Euro cents. }
                note: { type: [string, 'null'] }
      responses:
        '201': { description: Recorded, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/users:
    get:
      tags: [admin]
      summary: List accounts (CEO only)
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: offset, in: query, required: false, schema: { type: integer, default: 0 } }
      responses:
        '200':
          description: Users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          users:
                            type: array
                            items: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/users/{userID}/role:
    patch:
      tags: [admin]
      summary: Change a user's clearance level (CEO only)
      parameters:
        - { name: userID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roleLevel]
              properties:
                roleLevel: { type: integer, minimum: 1, maximum: 10 }
      responses:
        '200': { description: Role changed, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/users/{userID}/reset-password:
    post:
      tags: [admin]
      summary: Reset a user's password (CEO only); revokes their sessions
      parameters:
        - { name: userID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                newPassword: { type: string, minLength: 12, maxLength: 128 }
      responses:
        '200': { description: Password reset, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/users/{userID}/activate:
    post:
      tags: [admin]
      summary: Activate a user (CEO only)
      parameters:
        - { name: userID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Activated, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/users/{userID}/deactivate:
    post:
      tags: [admin]
      summary: Deactivate a user (CEO only); revokes their sessions
      parameters:
        - { name: userID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Deactivated, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/audit:
    get:
      tags: [admin]
      summary: Read the audit log (CEO only)
      parameters:
        - { name: action, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50 } }
        - { name: offset, in: query, required: false, schema: { type: integer, default: 0 } }
      responses:
        '200':
          description: Audit entries, newest first
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          entries:
                            type: array
                            items: { $ref: '#/components/schemas/AuditEntry' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /e2ee/devices:
    post:
      tags: [e2ee]
      summary: Register the acting user's device identity key (E2EE directory)
      description: >
        Announces a device's Ed25519 public key. An optional cross-signing
        vouch (signedBy + signature over "KISY-device-vouch-v1" || key) links a
        newly QR-paired device to an existing one. The server sanity-checks the
        vouch but is NOT the trust root — clients verify via TOFU/safety numbers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceId, ed25519Pub]
              properties:
                deviceId: { type: string, format: uuid }
                name: { type: string, maxLength: 128 }
                ed25519Pub: { type: string, format: byte, description: 32-byte Ed25519 public key, base64. }
                signedBy: { type: [string, 'null'], format: uuid }
                signature: { type: string, format: byte }
      responses:
        '201':
          description: Device registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          device: { $ref: '#/components/schemas/E2EEDevice' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /e2ee/users/{userID}/devices:
    get:
      tags: [e2ee]
      summary: List a user's active devices (public keys for TOFU)
      parameters:
        - { name: userID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Active devices
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          devices:
                            type: array
                            items: { $ref: '#/components/schemas/E2EEDevice' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /e2ee/devices/{deviceID}:
    delete:
      tags: [e2ee]
      summary: Revoke one of the acting user's own devices
      parameters:
        - { name: deviceID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Device revoked }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /e2ee/key-packages:
    post:
      tags: [e2ee]
      summary: Upload a batch of one-time MLS key packages for an own device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceId, keyPackages]
              properties:
                deviceId: { type: string, format: uuid }
                keyPackages:
                  type: array
                  maxItems: 100
                  items: { type: string, format: byte, description: Encoded MLS key package, base64 (max 8 KiB). }
      responses:
        '201': { description: Packages stored }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /e2ee/key-packages/count:
    get:
      tags: [e2ee]
      summary: Remaining unconsumed key packages for an own device
      parameters:
        - { name: deviceId, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Available count
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          available: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /e2ee/users/{userID}/key-packages/claim:
    post:
      tags: [e2ee]
      summary: Atomically consume one key package per active device of a user
      description: Called when adding that user to an MLS group. Devices with an empty pool are skipped.
      parameters:
        - { name: userID, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: excludeDevice, in: query, required: false, schema: { type: string, format: uuid }, description: Skip this device (used when claiming one's own other devices). }
      responses:
        '200':
          description: One package per device
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          keyPackages:
                            type: array
                            items:
                              type: object
                              properties:
                                deviceId: { type: string, format: uuid }
                                keyPackage: { type: string, format: byte }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /e2ee/handshake:
    post:
      tags: [e2ee]
      summary: Publish an MLS handshake frame (welcome, commit or proposal)
      description: >
        Commits/proposals fan out to the chat (e2ee.handshake WS event);
        welcomes are stored per recipient device (e2ee.welcome WS event).
        Payloads are protocol ciphertext the server cannot read.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chatType, chatId, kind, senderDevice, payload]
              properties:
                chatType: { type: string, enum: [private, group] }
                chatId: { type: string, format: uuid }
                kind: { type: string, enum: [welcome, commit, proposal] }
                senderDevice: { type: string, format: uuid }
                payload: { type: string, format: byte, description: Encoded MLS message, base64 (max 256 KiB). }
                epoch: { type: [integer, 'null'], format: int64 }
                recipients:
                  type: object
                  description: For welcomes — deviceId → userId of each recipient.
                  additionalProperties: { type: string, format: uuid }
      responses:
        '201': { description: Published }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /e2ee/handshake/{chatType}/{chatID}:
    get:
      tags: [e2ee]
      summary: List a chat's commits/proposals (member-only), oldest first
      parameters:
        - { name: chatType, in: path, required: true, schema: { type: string, enum: [private, group] } }
        - { name: chatID, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: afterId, in: query, required: false, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Handshake frames
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          messages:
                            type: array
                            items: { $ref: '#/components/schemas/E2EEGroupMessage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /e2ee/welcomes:
    get:
      tags: [e2ee]
      summary: Unfetched welcome messages addressed to an own device
      parameters:
        - { name: deviceId, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Pending welcomes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          welcomes:
                            type: array
                            items: { $ref: '#/components/schemas/E2EEGroupMessage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /e2ee/welcomes/{welcomeID}/ack:
    post:
      tags: [e2ee]
      summary: Acknowledge a processed welcome (stops re-delivery)
      parameters:
        - { name: welcomeID, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: deviceId, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Acknowledged }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /e2ee/backup:
    put:
      tags: [e2ee]
      summary: Store the user's encrypted key/history backup
      description: >
        The blob is encrypted CLIENT-SIDE under a key derived from a recovery
        passphrase (Argon2id). The server cannot decrypt it; kdfParams carries
        only public KDF inputs (salt, opslimit, memlimit).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [blob, kdfParams]
              properties:
                blob: { type: string, format: byte, description: Ciphertext, base64 (max 16 MiB decoded). }
                kdfParams: { type: object }
      responses:
        '201': { description: Backup stored }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    get:
      tags: [e2ee]
      summary: Fetch the user's encrypted backup
      responses:
        '200':
          description: Backup blob and KDF params
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          backup:
                            type: object
                            properties:
                              blob: { type: string, format: byte }
                              kdfParams: { type: object }
                              updatedAt: { type: string, format: date-time }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [e2ee]
      summary: Delete the user's encrypted backup
      responses:
        '200': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    accessCookie:
      type: apiKey
      in: cookie
      name: kisy_access
    refreshCookie:
      type: apiKey
      in: cookie
      name: kisy_refresh
  security:
    - accessCookie: []

  schemas:
    Envelope:
      type: object
      required: [success, requestId, timestamp]
      properties:
        success: { type: boolean }
        data: { type: object }
        error: { $ref: '#/components/schemas/Error' }
        requestId: { type: string }
        timestamp: { type: string, format: date-time }
    Error:
      type: object
      properties:
        code:
          type: string
          enum:
            - AUTH_INVALID_TOKEN
            - AUTH_INVALID_CREDENTIALS
            - AUTH_EXPIRED
            - ACCESS_DENIED
            - RESOURCE_NOT_FOUND
            - RATE_LIMITED
            - VALIDATION_FAILED
            - INTERNAL_ERROR
        message: { type: string }
        details: {}
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        displayName: { type: string }
        roleLevel: { type: integer, minimum: 1, maximum: 10 }
        avatarUrl: { type: [string, 'null'] }
        status: { type: string, enum: [online, offline, away] }
        isActive: { type: boolean }
        lastSeen: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
    Invitation:
      type: object
      properties:
        token: { type: string }
        creatorId: { type: string, format: uuid }
        expiresAt: { type: string, format: date-time }
    Group:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: [string, 'null'] }
        avatarUrl: { type: [string, 'null'] }
        minRoleLevel: { type: integer, minimum: 1, maximum: 10 }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
    BoardCard:
      type: object
      properties:
        id: { type: string, format: uuid }
        columnId: { type: string, format: uuid }
        title: { type: string }
        description: { type: [string, 'null'] }
        position: { type: integer }
        assigneeId: { type: [string, 'null'], format: uuid }
        label: { type: [string, 'null'] }
        dueDate: { type: [string, 'null'], format: date-time }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
    BoardColumn:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        position: { type: integer }
        cards: { type: array, items: { $ref: '#/components/schemas/BoardCard' } }
    Board:
      type: object
      properties:
        id: { type: string, format: uuid }
        groupId: { type: string, format: uuid }
        title: { type: string }
        createdBy: { type: string, format: uuid }
        columns: { type: array, items: { $ref: '#/components/schemas/BoardColumn' } }
    CardInput:
      type: object
      required: [title]
      properties:
        title: { type: string, maxLength: 256 }
        description: { type: [string, 'null'] }
        assigneeId: { type: [string, 'null'], format: uuid }
        label: { type: [string, 'null'] }
        dueDate: { type: [string, 'null'], format: date-time }
    Chat:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [private] }
        otherUserId: { type: string, format: uuid }
        otherUser: { oneOf: [{ $ref: '#/components/schemas/User' }, { type: 'null' }] }
        unreadCount: { type: integer }
        otherLastReadAt:
          description: When the counterpart last read this chat (drives read receipts); null if never.
          oneOf: [{ type: string, format: date-time }, { type: 'null' }]
        createdAt: { type: string, format: date-time }
    Message:
      type: object
      properties:
        id: { type: string, format: uuid }
        chatId: { type: string, format: uuid }
        chatType: { type: string, enum: [private, group] }
        senderId: { type: string, format: uuid }
        text: { type: [string, 'null'] }
        replyTo: { type: [string, 'null'], format: uuid }
        attachments: { type: array, items: {} }
        reactions:
          type: array
          items: { $ref: '#/components/schemas/ReactionSummary' }
        mentions: { type: array, items: {} }
        isDeleted: { type: boolean }
        createdAt: { type: string, format: date-time }
        deletedAt: { type: [string, 'null'], format: date-time }
        editedAt: { type: [string, 'null'], format: date-time }
        pinnedAt: { type: [string, 'null'], format: date-time }
        readCount: { type: [integer, 'null'], description: For own group messages, recipients who have read it. }
        readTotal: { type: [integer, 'null'], description: For own group messages, total recipients. }
        ciphertext: { type: [string, 'null'], format: byte, description: E2EE body (base64 MLS ciphertext); text is null when present. }
        alg: { type: [integer, 'null'], description: E2EE scheme version (1 = MLS X25519/ChaCha20-Poly1305/Ed25519). }
        epoch: { type: [integer, 'null'], format: int64, description: MLS epoch the message was sent in. }
        contentKind: { type: [integer, 'null'], description: 1 text, 2 attachment, 3 system — without revealing content. }
        forwardedFrom:
          type: [object, 'null']
          description: Original-author snapshot for a forwarded message (never the source chat).
          properties:
            senderId: { type: string, format: uuid }
            senderName: { type: string }
        scheduledId:
          type: [string, 'null']
          format: uuid
          description: >
            Scheduled origin (stage I) — present only on messages sent by the
            scheduler; lets the sender's client re-key its locally cached
            E2EE plaintext onto the delivered message id.
        expiresAt:
          type: [string, 'null']
          format: date-time
          description: >
            Disappearing (stage J) — when this message self-destructs.
            Metadata only; in E2EE chats the server sees the timer, never
            the content.
    MessagePage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Message' }
        nextCursor: { type: string }
        hasMore: { type: boolean }
    DisappearSetting:
      type: object
      properties:
        ttlSeconds: { type: [integer, 'null'], description: Default TTL for new messages; null = off. }
        setBy: { type: [string, 'null'], format: uuid }
        updatedAt: { type: [string, 'null'], format: date-time }
    ScheduledMessage:
      type: object
      properties:
        id: { type: string, format: uuid }
        chatType: { type: string, enum: [private, group] }
        chatId: { type: string, format: uuid }
        text: { type: [string, 'null'] }
        ciphertext: { type: [string, 'null'], description: Base64 MLS ciphertext (E2EE snapshots). }
        alg: { type: [integer, 'null'] }
        epoch: { type: [integer, 'null'], format: int64 }
        contentKind: { type: [integer, 'null'] }
        replyTo: { type: [string, 'null'], format: uuid }
        attachmentIds:
          type: array
          items: { type: string, format: uuid }
        sendAt: { type: string, format: date-time }
        status: { type: string, enum: [pending, sent, canceled] }
        sentMessageId: { type: [string, 'null'], format: uuid, description: The message the worker created (set once sent). }
        createdAt: { type: string, format: date-time }
    ChatFolder:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string, maxLength: 64 }
        position: { type: integer }
        items:
          type: array
          items:
            type: object
            properties:
              chatType: { type: string, enum: [private, group] }
              chatId: { type: string, format: uuid }
    NotificationSettings:
      type: object
      properties:
        sound: { type: boolean }
        preview: { type: boolean, description: Show message text preview in notifications. }
        groupMode:
          type: string
          enum: [all, mentions_only, none]
          description: How group chats notify — every message, only @mentions, or never. Private chats always notify unless muted.
    ReactionSummary:
      type: object
      properties:
        emoji: { type: string }
        count: { type: integer }
        reacted: { type: boolean }
    Attachment:
      type: object
      properties:
        id: { type: string, format: uuid }
        fileName: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer, format: int64 }
        isImage: { type: boolean }
        url: { type: string }
        kind: { type: string, enum: [file, image, voice, video] }
        durationMs: { type: [integer, 'null'], description: Playback length for voice/video. }
        waveform: { type: [string, 'null'], format: byte, description: Base64 peak envelope for voice bubbles. }
        width: { type: [integer, 'null'] }
        height: { type: [integer, 'null'] }
    UploadSession:
      type: object
      properties:
        id: { type: string, format: uuid }
        chunkBytes: { type: integer }
        declaredBytes: { type: integer, format: int64 }
        expiresAt: { type: string, format: date-time }
        receivedChunks:
          type: array
          items: { type: integer }
          description: Chunk indexes already stored (resume support).
    E2EEDevice:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        name: { type: string }
        ed25519Pub: { type: string, format: byte, description: Ed25519 identity public key, base64. }
        signedBy: { type: [string, 'null'], format: uuid, description: Device that vouched for this one (cross-signing). }
        signature: { type: [string, 'null'], format: byte }
        createdAt: { type: string, format: date-time }
        revokedAt: { type: [string, 'null'], format: date-time }
    E2EEGroupMessage:
      type: object
      properties:
        id: { type: string, format: uuid }
        chatType: { type: string, enum: [private, group] }
        chatId: { type: string, format: uuid }
        kind: { type: integer, description: 1 welcome, 2 commit, 3 proposal. }
        senderDevice: { type: [string, 'null'], format: uuid }
        recipientDevice: { type: [string, 'null'], format: uuid }
        payload: { type: string, format: byte, description: Encoded MLS message, base64. }
        epoch: { type: [integer, 'null'], format: int64 }
        createdAt: { type: string, format: date-time }
    Favorite:
      type: object
      properties:
        chatType: { type: string, enum: [private, group] }
        chatId: { type: string, format: uuid }
        isPinned: { type: boolean }
        pinnedOrder: { type: [integer, 'null'] }
    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string }
        payload: { type: object }
        isRead: { type: boolean }
        createdAt: { type: string, format: date-time }
    Feedback:
      type: object
      properties:
        id: { type: string, format: uuid }
        body: { type: string }
        createdAt: { type: string, format: date-time }
        author:
          type: object
          properties:
            id: { type: string, format: uuid }
            displayName: { type: string }
            username: { type: string }
            avatarUrl: { type: [string, 'null'] }
            roleLevel: { type: integer }
    RatingTask:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        projectTitle: { type: string }
        title: { type: string }
        assignee:
          oneOf:
            - type: object
              properties:
                id: { type: string, format: uuid }
                displayName: { type: string }
                avatarUrl: { type: [string, 'null'] }
            - type: 'null'
        progress: { type: integer, minimum: 0, maximum: 100 }
        status: { type: string, enum: [backlog, in_progress, done] }
        totalProfitKopecks: { type: integer, format: int64 }
        createdAt: { type: string, format: date-time }
    RatingProject:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: [string, 'null'] }
        difficulty: { type: string, enum: [easy, medium, hard] }
        minLevel: { type: integer, minimum: 1, maximum: 10 }
        status: { type: string, enum: [active, done] }
        createdBy: { type: string, format: uuid }
        totalProfitKopecks: { type: integer, format: int64, description: Profit in euro cents. }
        tasks: { type: array, items: { $ref: '#/components/schemas/RatingTask' } }
        createdAt: { type: string, format: date-time }
    RatingAnalytics:
      type: object
      properties:
        perProject:
          type: array
          items:
            type: object
            properties:
              projectId: { type: string, format: uuid }
              title: { type: string }
              profitKopecks: { type: integer, format: int64 }
        monthly:
          type: array
          items:
            type: object
            properties:
              month: { type: string, example: "2026-01" }
              profitKopecks: { type: integer, format: int64 }
    AuditEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        actorId: { type: [string, 'null'], format: uuid }
        action: { type: string }
        targetType: { type: [string, 'null'] }
        targetId: { type: [string, 'null'], format: uuid }
        requestId: { type: [string, 'null'] }
        metadata: { type: object }
        createdAt: { type: string, format: date-time }

  responses:
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    Unauthorized:
      description: Authentication required or failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    Forbidden:
      description: Insufficient clearance
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    NotFound:
      description: Resource not found (or hidden from this clearance)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    Conflict:
      description: Resource conflict (e.g. username taken)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }

security:
  - accessCookie: []
