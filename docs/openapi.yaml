openapi: 3.1.0
info:
  title: KISY Enterprise Messenger API
  version: 0.6.0
  description: >
    REST API for the KISY enterprise messenger. Covers stages 2–4:
    authentication, access control, invitations, profile, groups, private
    chats, messages, reactions, read state, favorites, notifications, the
    CEO admin surface and the WebSocket gateway. File handling is added in a
    later stage.
servers:
  - url: /api/v1
    description: Versioned API root (behind the Nginx edge proxy)

tags:
  - name: auth
    description: Authentication and session lifecycle
  - name: users
    description: Current user's profile
  - name: invitations
    description: CEO-issued registration tokens
  - name: groups
    description: Group chats with clearance-gated visibility
  - name: chats
    description: One-to-one private conversations
  - name: boards
    description: Trello-style task boards attached to groups
  - name: messages
    description: Chat messages (editing disabled by design)
  - name: notifications
    description: Per-user notifications (@mentions)
  - name: notes
    description: Personal notes (private per-user scratchpad with optional files)
  - name: conditions
    description: Promotion-requirement ladder (CEO edits all; members see only their next level)
  - name: voting
    description: Polls (CEO-created; public votes with voter avatars; results audited on close)
  - name: calls
    description: 1:1 WebRTC audio calls — ICE config and call journal (live signaling runs over the WebSocket gateway)
  - name: folders
    description: Personal chat folders and archive (organizational metadata over chat references; never grants or reveals access)
  - name: scheduled
    description: Delayed message sending — frozen send-body snapshots replayed by the worker at sendAt (E2EE chats encrypt at scheduling time, docs/security.md "path A")
  - name: disappearing
    description: Disappearing messages — a chat-wide default TTL plus per-message timers; expired messages are HARD-deleted (rows, ciphertext and attachment bytes) and clients purge their local plaintext caches
  - name: admin
    description: CEO administration (users, roles, credentials, audit)
  - name: websocket
    description: Real-time gateway

paths:
  /auth/register:
    post:
      tags: [auth]
      summary: Register using an invitation token
      description: >
        Redeems a single-use invitation token (120s lifetime) and creates
        an account at the lowest clearance level, then opens the first
        session (sets auth cookies).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inviteToken, username, password]
              properties:
                inviteToken:
                  type: string
                username:
                  type: string
                  pattern: '^[A-Za-z0-9_]{3,32}$'
                password:
                  type: string
                  minLength: 12
                  maxLength: 128
      responses:
        '201':
          description: Account created, session opened
          headers:
            Set-Cookie:
              description: kisy_access and kisy_refresh HTTPOnly cookies
              schema: { type: string }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/login:
    post:
      tags: [auth]
      summary: Authenticate and open a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Authenticated, session opened
          headers:
            Set-Cookie:
              description: kisy_access and kisy_refresh HTTPOnly cookies
              schema: { type: string }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429':
          description: Rate limited or account temporarily locked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }

  /auth/refresh:
    post:
      tags: [auth]
      summary: Rotate the refresh token
      description: >
        Exchanges the current refresh cookie for a new access+refresh pair
        (refresh token rotation). Replaying a rotated token revokes the
        session (theft detection).
      security:
        - refreshCookie: []
      responses:
        '200':
          description: Tokens rotated
          headers:
            Set-Cookie:
              description: fresh kisy_access and kisy_refresh cookies
              schema: { type: string }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          accessExpiresAt: { type: string, format: date-time }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [auth]
      summary: Invalidate the current session
      responses:
        '200':
          description: Logged out; cookies cleared
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout-all:
    post:
      tags: [auth]
      summary: Invalidate every active session of the user
      responses:
        '200':
          description: All sessions revoked; cookies cleared
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          revokedSessions: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/password:
    post:
      tags: [auth]
      summary: Change the current user's password
      description: >
        Verifies the current password, stores the new hash and revokes all
        other sessions of the user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string }
                newPassword:
                  type: string
                  minLength: 12
                  maxLength: 128
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /users/me:
    get:
      tags: [users]
      summary: Return the current user's profile
      responses:
        '200':
          description: Current profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [users]
      summary: Update the current user's display name and/or username
      description: At least one of displayName, username must be provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  minLength: 1
                  maxLength: 64
                username:
                  type: string
                  pattern: '^[A-Za-z0-9_]{3,32}$'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }

  /users/me/avatar:
    post:
      tags: [users]
      summary: Upload the current user's avatar
      description: >
        Raw image body (image/jpeg or image/png), square, max 512 KB after the
        client-side crop. Returns the updated profile and broadcasts a
        user.updated WebSocket event to the user's audience.
      requestBody:
        required: true
        content:
          image/jpeg:
            schema: { type: string, format: binary }
          image/png:
            schema: { type: string, format: binary }
      responses:
        '200':
          description: Avatar stored
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { $ref: '#/components/responses/ValidationError' }

  /avatars/{ownerType}/{ownerID}:
    get:
      tags: [users]
      summary: Serve a user or group avatar image
      parameters:
        - { name: ownerType, in: path, required: true, schema: { type: string, enum: [user, group] } }
        - { name: ownerID, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: v, in: query, required: false, schema: { type: integer }, description: Cache-busting version. }
      responses:
        '200':
          description: The avatar image
          content:
            image/jpeg: { schema: { type: string, format: binary } }
            image/png: { schema: { type: string, format: binary } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /invites:
    post:
      tags: [invitations]
      summary: Generate an invitation token (CEO only)
      description: >
        Requires clearance level 1. Returns a single-use token valid for
        120 seconds; the plaintext token is shown only in this response.
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Invitation' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /users/directory:
    get:
      tags: [users]
      summary: Search users you may start a chat with (same or lower clearance)
      parameters:
        - { name: search, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 25, maximum: 50 } }
      responses:
        '200':
          description: Matching users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          users:
                            type: array
                            items: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /groups:
    get:
      tags: [groups]
      summary: List groups visible to the current clearance
      responses:
        '200':
          description: Visible groups (min_role_level >= actor level)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          groups:
                            type: array
                            items: { $ref: '#/components/schemas/Group' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [groups]
      summary: Create a group
      description: >
        Any authenticated user may create a group, but its minimum clearance
        cannot be stronger than the creator's own (minRoleLevel must be >=
        the creator's role level). The creator becomes the group founder.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, minRoleLevel]
              properties:
                name: { type: string, minLength: 1, maxLength: 128 }
                description: { type: [string, 'null'] }
                minRoleLevel: { type: integer, minimum: 1, maximum: 10 }
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          group: { $ref: '#/components/schemas/Group' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Requested clearance is stronger than the creator's own
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }

  /groups/{groupID}:
    get:
      tags: [groups]
      summary: Get a visible group
      parameters:
        - { name: groupID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Group
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          group: { $ref: '#/components/schemas/Group' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [groups]
      summary: Delete a group (CEO or founder)
      description: >
        The CEO may delete any group; otherwise only the group's founder may
        delete it. Cascades to members, the task board and group messages. A
        group hidden from the caller's clearance returns 404 (not 403).
      parameters:
        - { name: groupID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Deleted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /groups/{groupID}/members:
    post:
      tags: [groups]
      summary: Add a member to a group
      parameters:
        - { name: groupID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: string, format: uuid }
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    get:
      tags: [groups]
      summary: List a group's members (visible to members)
      parameters:
        - { name: groupID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Members
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          members: { type: array, items: { $ref: '#/components/schemas/User' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /groups/{groupID}/avatar:
    post:
      tags: [groups]
      summary: Upload a group's avatar (founder or CEO only)
      description: >
        Raw image body (image/jpeg or image/png), square, max 512 KB. Only the
        group's founder or the CEO may change it. Emits a group.changed
        WebSocket event so members refetch.
      parameters:
        - { name: groupID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          image/jpeg:
            schema: { type: string, format: binary }
          image/png:
            schema: { type: string, format: binary }
      responses:
        '200':
          description: Group avatar stored
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          group: { $ref: '#/components/schemas/Group' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /groups/{groupID}/board:
    get:
      tags: [boards]
      summary: Get the group's task board (404 if not created yet)
      parameters:
        - { name: groupID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Board with columns and cards
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          board: { $ref: '#/components/schemas/Board' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [boards]
      summary: Create the task board (group founder only)
      description: Seeds three default columns. Only the group's founder may create it.
      parameters:
        - { name: groupID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: { title: { type: string } }
      responses:
        '201':
          description: Board created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          board: { $ref: '#/components/schemas/Board' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /boards/{boardID}/columns:
    post:
      tags: [boards]
      summary: Add a column (founder only)
      parameters:
        - { name: boardID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [title], properties: { title: { type: string } } }
      responses:
        '200': { description: Column added, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }

  /boards/columns/{columnID}:
    patch:
      tags: [boards]
      summary: Rename a column (founder only)
      parameters:
        - { name: columnID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [title], properties: { title: { type: string } } }
      responses:
        '200': { description: Renamed, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [boards]
      summary: Delete a column and its cards (founder only)
      parameters:
        - { name: columnID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Deleted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }

  /boards/columns/{columnID}/cards:
    post:
      tags: [boards]
      summary: Create a card in a column (any group member)
      parameters:
        - { name: columnID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CardInput' }
      responses:
        '201':
          description: Card created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties: { card: { $ref: '#/components/schemas/BoardCard' } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /boards/cards/{cardID}:
    patch:
      tags: [boards]
      summary: Update a card (any group member)
      parameters:
        - { name: cardID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CardInput' }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [boards]
      summary: Delete a card (creator or founder)
      parameters:
        - { name: cardID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Deleted, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /boards/cards/{cardID}/move:
    post:
      tags: [boards]
      summary: Move a card to a column and index (drag-and-drop)
      parameters:
        - { name: cardID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [columnId, index]
              properties:
                columnId: { type: string, format: uuid }
                index: { type: integer, minimum: 0 }
      responses:
        '200': { description: Moved, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /chats:
    get:
      tags: [chats]
      summary: List the current user's private chats
      responses:
        '200':
          description: Private chats
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          chats:
                            type: array
                            items: { $ref: '#/components/schemas/Chat' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [chats]
      summary: Open (or fetch) a private chat with another user
      description: >
        Idempotent. Enforces the initiation rule: a user may open a chat
        only with same-or-lower clearance; the existing chat is returned if
        one already exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: string, format: uuid }
      responses:
        '200':
          description: Chat opened or already existed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          chat: { $ref: '#/components/schemas/Chat' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /chats/{chatID}:
    get:
      tags: [chats]
      summary: Get a private chat the user participates in
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Chat
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          chat: { $ref: '#/components/schemas/Chat' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /messages:
    post:
      tags: [messages]
      summary: Send a message to a chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chatType, chatId]
              description: The body is text (legacy), ciphertext (E2EE) or attachments — text and ciphertext are mutually exclusive.
              properties:
                chatType: { type: string, enum: [private, group] }
                chatId: { type: string, format: uuid }
                text: { type: string, maxLength: 8000 }
                replyTo: { type: [string, 'null'], format: uuid }
                attachmentIds: { type: array, items: { type: string, format: uuid } }
                ciphertext: { type: string, format: byte, description: Base64 MLS ciphertext (max 64 KiB decoded). Requires alg. }
                alg: { type: integer, description: E2EE scheme version; required with ciphertext. }
                epoch: { type: integer, format: int64 }
                contentKind: { type: integer, description: 1 text, 2 attachment, 3 system. }
                forwardedFromSenderId: { type: string, format: uuid, description: Client-side (E2EE) forward attribution — original author id snapshot. }
                forwardedFromSenderName: { type: string, description: Client-side (E2EE) forward attribution — original author name snapshot. }
      responses:
        '201':
          description: Message created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          message: { $ref: '#/components/schemas/Message' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    get:
      tags: [messages]
      summary: List messages of a chat (cursor pagination, newest first)
      parameters:
        - { name: chatType, in: query, required: true, schema: { type: string, enum: [private, group] } }
        - { name: chatId, in: query, required: true, schema: { type: string, format: uuid } }
        - { name: cursor, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50, maximum: 200 } }
      responses:
        '200':
          description: A page of messages
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/MessagePage' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /messages/forward:
    post:
      tags: [messages]
      summary: Forward plaintext messages into a target chat
      description: >
        Copies the actor's accessible PLAINTEXT messages into the target,
        newest-first order preserved, each stamped with a forwarded-from
        author snapshot (never the source chat). Rules: the actor must be
        able to read every source and post to the target (a masked 404
        otherwise, so inaccessible sources are never revealed); the target's
        audience must not be broader than any source's (403 — content never
        moves up the clearance hierarchy). E2EE source messages are rejected
        (409) — the server cannot read them, so the client decrypts and
        re-sends them via POST /messages with forwardedFrom* set. Each forward
        is audited.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceMessageIds, targetChatType, targetChatId]
              properties:
                sourceMessageIds:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items: { type: string, format: uuid }
                targetChatType: { type: string, enum: [private, group] }
                targetChatId: { type: string, format: uuid }
      responses:
        '201':
          description: Forwarded messages created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          messages:
                            type: array
                            items: { $ref: '#/components/schemas/Message' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/ValidationError' }

  /messages/pinned:
    get:
      tags: [messages]
      summary: List a chat's pinned messages
      parameters:
        - { name: chatType, in: query, required: true, schema: { type: string, enum: [private, group] } }
        - { name: chatId, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Pinned messages, most recently pinned first
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          pinned: { type: array, items: { $ref: '#/components/schemas/Message' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /messages/{messageID}/pin:
    post:
      tags: [messages]
      summary: Pin a message (any chat participant)
      parameters: [{ name: messageID, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Pinned, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /messages/{messageID}/unpin:
    post:
      tags: [messages]
      summary: Unpin a message (any chat participant)
      parameters: [{ name: messageID, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Unpinned, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /messages/{messageID}:
    patch:
      tags: [messages]
      summary: Edit a message (sender only)
      description: >
        Only the sender may edit, and only a non-deleted message. Sets
        editedAt and republishes the message over WebSocket (message.updated).
      parameters:
        - { name: messageID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [text], properties: { text: { type: string, minLength: 1, maxLength: 8000 } } }
      responses:
        '200':
          description: Edited
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          message: { $ref: '#/components/schemas/Message' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [messages]
      summary: Delete a message
      description: >
        The sender may delete their own message; the CEO may delete any
        message. Deletion is a tombstone — the timeline slot remains but
        the text is cleared.
      parameters:
        - { name: messageID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /search:
    get:
      tags: [messages]
      summary: Full-text search of messages you can see
      description: >
        Searches messages (Russian full-text) scoped to the caller's private
        chats and group memberships. Requires q of at least a couple of chars.
      parameters:
        - { name: q, in: query, required: true, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 25, maximum: 50 } }
      responses:
        '200':
          description: Matching messages, most relevant first
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          results:
                            type: array
                            items:
                              type: object
                              properties:
                                messageId: { type: string, format: uuid }
                                chatType: { type: string, enum: [private, group] }
                                chatId: { type: string, format: uuid }
                                senderId: { type: string, format: uuid }
                                senderName: { type: string }
                                text: { type: string }
                                createdAt: { type: string, format: date-time }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /link-preview:
    post:
      tags: [messages]
      summary: Fetch OpenGraph metadata for a URL (SSRF-guarded)
      description: >
        The server fetches the URL on the user's behalf and returns
        title/description/imageUrl/siteName. SSRF-critical: only http/https;
        the resolved IP is re-checked right before dialing, so private,
        loopback, link-local (incl. 169.254.169.254 cloud metadata), CGNAT
        and unspecified addresses are refused — defeating DNS rebinding too.
        Body size and timeout are capped; redirects are re-validated per hop;
        results are cached in Redis (failures negatively). In E2EE chats the
        server never sees the URL, so the client calls this only on explicit
        user action.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
      responses:
        '200':
          description: Preview metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          preview:
                            type: object
                            properties:
                              url: { type: string }
                              title: { type: string }
                              description: { type: string }
                              imageUrl: { type: string }
                              siteName: { type: string }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /link-preview/image:
    get:
      tags: [messages]
      summary: Proxy a preview image through the SSRF guard (same-origin)
      description: >
        Re-fetches a preview image URL through the same guard and streams the
        bytes, so the browser loads it same-origin under strict CSP
        (img-src 'self'). Only image/* responses are served.
      parameters:
        - { name: url, in: query, required: true, schema: { type: string, format: uri } }
      responses:
        '200': { description: Image bytes, content: { image/*: { schema: { type: string, format: binary } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /chats/media:
    get:
      tags: [messages]
      summary: Aggregated shared content of a chat (context panel tabs)
      description: >
        Returns the chat's media (image/video attachments), files (plain file
        attachments) or links (URLs extracted from plaintext message bodies),
        newest first with cursor pagination. Access is checked with the same
        chat authorizer as the message list, so clearance rules hold and the
        existence of inaccessible chats never leaks (404). E2EE message
        bodies are ciphertext to the server, so they contribute nothing to
        the links tab by design. Query-parameter addressing follows the
        GET /messages convention.
      parameters:
        - { name: chatType, in: query, required: true, schema: { type: string, enum: [private, group] } }
        - { name: chatId, in: query, required: true, schema: { type: string, format: uuid } }
        - { name: kind, in: query, required: true, schema: { type: string, enum: [media, files, links] } }
        - { name: cursor, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50, maximum: 200 } }
      responses:
        '200':
          description: One page of items (media/files return attachment items; links return URL items)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                attachment: { $ref: '#/components/schemas/Attachment' }
                                url: { type: string, description: Links tab only. }
                                messageId: { type: string, format: uuid }
                                senderId: { type: string, format: uuid }
                                createdAt: { type: string, format: date-time }
                          nextCursor: { type: string }
                          hasMore: { type: boolean }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /attachments:
    post:
      tags: [messages]
      summary: Upload a file attachment in one request (raw body; name in X-File-Name header)
      description: >
        Single-shot path for small files. The size limit is clearance-based
        (see GET /attachments/limit); larger files use the chunked flow
        (init → chunk → complete). Optional media metadata travels in
        X-Attachment-Kind / X-Attachment-Duration-Ms / X-Attachment-Width /
        X-Attachment-Height / X-Attachment-Waveform (base64) headers.
        Content is inspected server-side (MIME sniffing; executables
        rejected) before the file becomes servable. Voice notes
        (kind=voice) additionally require an audio container (webm/ogg/mp4
        family) and a duration between 1 ms and 10 minutes.
        Link the returned id to a message via the message's attachmentIds.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        '201':
          description: Stored
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          attachment: { $ref: '#/components/schemas/Attachment' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { $ref: '#/components/responses/ValidationError' }
        '415': { $ref: '#/components/responses/ValidationError' }
  /attachments/limit:
    get:
      tags: [messages]
      summary: The actor's upload policy (clearance-differentiated, from config)
      responses:
        '200':
          description: Upload ceiling and chunk size
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          maxBytes: { type: integer, format: int64 }
                          chunkBytes: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /attachments/init:
    post:
      tags: [messages]
      summary: Open a resumable chunked upload session
      description: >
        Validates the declared size against the actor's limit before any bytes
        travel. Chunks are then PUT by index; complete assembles and inspects.
        Abandoned sessions expire (UPLOAD_SESSION_TTL) and are reaped.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName, sizeBytes]
              properties:
                fileName: { type: string }
                sizeBytes: { type: integer, format: int64 }
                kind: { type: string, enum: [file, image, voice, video] }
                durationMs: { type: integer }
                waveform: { type: string, format: byte, description: Peak envelope, max 1024 bytes decoded. }
                width: { type: integer }
                height: { type: integer }
      responses:
        '201':
          description: Session opened
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          upload: { $ref: '#/components/schemas/UploadSession' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { $ref: '#/components/responses/ValidationError' }
  /attachments/{id}/upload-status:
    get:
      tags: [messages]
      summary: Chunks already stored for a session (resume support)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200':
          description: Session state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          upload: { $ref: '#/components/schemas/UploadSession' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /attachments/{id}/chunk:
    put:
      tags: [messages]
      summary: Store one chunk (idempotent by index)
      description: >
        Every chunk except the last must be exactly chunkBytes; the last must
        land the total on the declared size. Re-sending an index overwrites
        the same bytes, so network retries are safe.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: index, in: query, required: true, schema: { type: integer, minimum: 0 } }
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        '200': { description: Chunk stored }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413': { $ref: '#/components/responses/ValidationError' }
  /attachments/{id}/complete:
    post:
      tags: [messages]
      summary: Assemble, inspect and finalize a chunked upload
      description: >
        Fails with 409 while chunks are missing. The assembled bytes pass the
        same inspection as the single-shot path (MIME sniffing, executable
        rejection) before the attachment is created; the session is removed
        in the same transaction.
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '201':
          description: Attachment created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          attachment: { $ref: '#/components/schemas/Attachment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/ValidationError' }
        '415': { $ref: '#/components/responses/ValidationError' }
  /attachments/{id}:
    get:
      tags: [messages]
      summary: Download an attachment (access-checked against its message)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: File bytes, content: { application/octet-stream: { schema: { type: string, format: binary } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /chats/{chatType}/{chatID}/mute:
    put:
      tags: [notifications]
      summary: Mute a chat's notifications (stage G)
      description: >
        Suppresses push and notification.created for this chat for the actor.
        untilSeconds sets a duration from now; omit or 0 to mute forever. The
        chat's unread counter is still tracked (shown greyed in the UI).
      parameters:
        - { name: chatType, in: path, required: true, schema: { type: string, enum: [private, group] } }
        - { name: chatID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                untilSeconds: { type: integer, description: Duration from now in seconds; 0/absent = forever. }
      responses:
        '200':
          description: Muted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          muted: { type: boolean }
                          mutedUntil: { type: [string, 'null'], format: date-time }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    delete:
      tags: [notifications]
      summary: Unmute a chat
      parameters:
        - { name: chatType, in: path, required: true, schema: { type: string, enum: [private, group] } }
        - { name: chatID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Unmuted }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /settings/mutes:
    get:
      tags: [notifications]
      summary: The actor's active chat mutes (for the chat list)
      responses:
        '200':
          description: Active mutes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          mutes:
                            type: array
                            items:
                              type: object
                              properties:
                                chatType: { type: string, enum: [private, group] }
                                chatId: { type: string, format: uuid }
                                mutedUntil: { type: [string, 'null'], format: date-time }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /settings/notifications:
    get:
      tags: [notifications]
      summary: The actor's notification settings
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          settings: { $ref: '#/components/schemas/NotificationSettings' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      tags: [notifications]
      summary: Update the actor's notification settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationSettings' }
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          settings: { $ref: '#/components/schemas/NotificationSettings' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /messages/schedule:
    post:
      tags: [scheduled]
      summary: Schedule a message for later sending (UPD3 stage I)
      description: >
        Freezes a send-body snapshot the worker replays through the standard
        send pipeline at sendAt (5s..1y from now; at most 100 pending per
        user). Access is checked now AND again at send time — losing access
        in between cancels the row. For E2EE private chats the client
        encrypts at scheduling time and submits ciphertext; the server never
        reads it. An inaccessible chat yields a masked 404.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chatType, chatId, sendAt]
              properties:
                chatType: { type: string, enum: [private, group] }
                chatId: { type: string, format: uuid }
                text: { type: string, maxLength: 8000 }
                ciphertext: { type: string, description: Base64 MLS ciphertext — mutually exclusive with text. }
                alg: { type: integer, description: E2EE scheme version (required with ciphertext). }
                epoch: { type: integer, format: int64 }
                contentKind: { type: integer }
                replyTo: { type: [string, 'null'], format: uuid }
                attachmentIds:
                  type: array
                  items: { type: string, format: uuid }
                  description: The actor's own unlinked uploads; re-verified at send time.
                sendAt: { type: string, format: date-time }
      responses:
        '201':
          description: Scheduled message snapshot
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          scheduled: { $ref: '#/components/schemas/ScheduledMessage' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /messages/scheduled:
    get:
      tags: [scheduled]
      summary: The actor's scheduled messages (pending first, then recent history)
      responses:
        '200':
          description: Scheduled messages
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          scheduled:
                            type: array
                            items: { $ref: '#/components/schemas/ScheduledMessage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /messages/scheduled/{id}:
    patch:
      tags: [scheduled]
      summary: Edit a pending scheduled message (content and/or send time)
      description: >
        Only the sender, only while pending. Providing text or ciphertext
        replaces the content snapshot as a whole (E2EE clients re-encrypt
        client-side and submit fresh ciphertext). A row already sent or
        canceled yields a masked 404.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text: { type: string, maxLength: 8000 }
                ciphertext: { type: string }
                alg: { type: integer }
                epoch: { type: integer, format: int64 }
                contentKind: { type: integer }
                sendAt: { type: string, format: date-time }
      responses:
        '200':
          description: Updated snapshot
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          scheduled: { $ref: '#/components/schemas/ScheduledMessage' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [scheduled]
      summary: Cancel a pending scheduled message (removes the snapshot, including ciphertext)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Canceled and removed }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /chats/{chatType}/{chatID}/disappearing:
    get:
      tags: [disappearing]
      summary: The chat's disappearing-messages timer (UPD3 stage J)
      parameters:
        - { name: chatType, in: path, required: true, schema: { type: string, enum: [private, group] } }
        - { name: chatID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Current timer (ttlSeconds null = off)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          disappearing: { $ref: '#/components/schemas/DisappearSetting' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [disappearing]
      summary: Enable, change or disable the chat's timer
      description: >
        Chat-wide (as in Signal/Telegram) — any member may change it and
        everyone sees the mode. New messages get expires_at = now + ttl; the
        reaper then HARD-deletes them (text, ciphertext, attachments) and
        clients purge local plaintext caches. The change is audited (TTL
        only, never content). ttlSeconds null/0 disables; otherwise 5s..1y.
        Inaccessible chats yield a masked 404.
      parameters:
        - { name: chatType, in: path, required: true, schema: { type: string, enum: [private, group] } }
        - { name: chatID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ttlSeconds: { type: [integer, 'null'], description: null/0 disables the timer. }
      responses:
        '200':
          description: Updated timer
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          disappearing: { $ref: '#/components/schemas/DisappearSetting' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /messages/{messageID}/expiry:
    put:
      tags: [disappearing]
      summary: Set or clear a disappearing timer on the actor's own message
      description: >
        Sender-only. ttlSeconds counts from now; null/0 clears. Republished
        as message.updated so every viewer's bubble shows the timer.
      parameters:
        - { name: messageID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ttlSeconds: { type: [integer, 'null'] }
      responses:
        '200':
          description: Updated message
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          message: { $ref: '#/components/schemas/Message' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /folders:
    get:
      tags: [folders]
      summary: The actor's chat folders with their items (UPD3 stage H)
      description: >
        Folders are personal organizational metadata. Filtering of the chat
        list by folder happens client-side against the access-filtered
        /chats and /groups responses, so a folder item referencing a chat
        the user can no longer access simply never renders. GET /chats is
        intentionally unchanged.
      responses:
        '200':
          description: Folders ordered by position
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          folders:
                            type: array
                            items: { $ref: '#/components/schemas/ChatFolder' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [folders]
      summary: Create a folder (max 50 per user)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 64 }
      responses:
        '201':
          description: Created folder
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          folder: { $ref: '#/components/schemas/ChatFolder' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /folders/order:
    put:
      tags: [folders]
      summary: Reorder folders
      description: folderIds must list every folder of the actor exactly once.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [folderIds]
              properties:
                folderIds:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        '200': { description: Reordered }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /folders/{folderID}:
    patch:
      tags: [folders]
      summary: Rename a folder
      parameters:
        - { name: folderID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 64 }
      responses:
        '200': { description: Renamed }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [folders]
      summary: Delete a folder (its items are dropped; chats are untouched)
      parameters:
        - { name: folderID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /folders/{folderID}/items:
    post:
      tags: [folders]
      summary: Add a chat to a folder
      description: >
        Chat access is verified so folders never accumulate references the
        user cannot see; an inaccessible chat yields a masked 404 (its
        existence is never confirmed). Adding is idempotent.
      parameters:
        - { name: folderID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chatType, chatId]
              properties:
                chatType: { type: string, enum: [private, group] }
                chatId: { type: string, format: uuid }
      responses:
        '200': { description: Added }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [folders]
      summary: Remove a chat from a folder (no access check — forgetting is always allowed)
      parameters:
        - { name: folderID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chatType, chatId]
              properties:
                chatType: { type: string, enum: [private, group] }
                chatId: { type: string, format: uuid }
      responses:
        '200': { description: Removed }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /chats/{chatType}/{chatID}/archive:
    put:
      tags: [folders]
      summary: Archive a chat for the actor (UPD3 stage H)
      description: >
        Personal, like mute — only the actor's own list is affected. The
        chat stays fully functional; the client hides it from the main list
        and shows it in the Archive section. Inaccessible chats yield a
        masked 404. Idempotent.
      parameters:
        - { name: chatType, in: path, required: true, schema: { type: string, enum: [private, group] } }
        - { name: chatID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Archived }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [folders]
      summary: Unarchive a chat
      parameters:
        - { name: chatType, in: path, required: true, schema: { type: string, enum: [private, group] } }
        - { name: chatID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Unarchived }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /settings/archived:
    get:
      tags: [folders]
      summary: The actor's archived chats (for the chat list)
      responses:
        '200':
          description: Archived chat references, newest first
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          archived:
                            type: array
                            items:
                              type: object
                              properties:
                                chatType: { type: string, enum: [private, group] }
                                chatId: { type: string, format: uuid }
                                archivedAt: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /push/vapid-public-key:
    get:
      tags: [notifications]
      summary: Get the VAPID public key (for Web Push subscription)
      responses:
        '200':
          description: Key and whether push is enabled server-side
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          publicKey: { type: string }
                          enabled: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /push/subscribe:
    post:
      tags: [notifications]
      summary: Register this browser's Web Push subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint, keys]
              properties:
                endpoint: { type: string }
                keys:
                  type: object
                  properties:
                    p256dh: { type: string }
                    auth: { type: string }
      responses:
        '200': { description: Subscribed, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /push/unsubscribe:
    post:
      tags: [notifications]
      summary: Remove a Web Push subscription
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [endpoint], properties: { endpoint: { type: string } } }
      responses:
        '200': { description: Unsubscribed, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /ws:
    get:
      tags: [websocket]
      summary: Upgrade to the real-time WebSocket connection
      description: >
        Authenticated via the kisy_access cookie or an `access_token` query
        parameter. After the upgrade, the client and server exchange JSON
        frames.

        Client→Server `type`: message.send, typing.start, typing.stop,
        presence.subscribe, read.confirmation.

        Server→Client `event`: message.created, message.updated,
        message.deleted, message.read, typing.started, typing.stopped, user.online,
        user.offline, user.updated, reaction.added, reaction.removed,
        notification.created, board.changed, group.changed, rating.changed,
        poll.changed, error.

        Voice-call signaling (1:1 audio, media is peer-to-peer over WebRTC; the
        server only relays these frames after authorizing that sender and target
        share the direct chat). Client→Server `type`: call.invite
        { callId, toUserId, chatId, sdp }, call.answer { callId, sdp }, call.ice
        { callId, candidate }, call.reject/call.cancel/call.hangup { callId }.
        Server→Client `event`: call.incoming { callId, from{id,displayName,avatarUrl},
        chatId, sdp }, call.answered { callId, sdp }, call.ice { callId, fromUserId,
        candidate }, call.rejected/call.canceled/call.busy/call.timeout { callId },
        call.ended { callId, reason }.
      parameters:
        - { name: access_token, in: query, required: false, schema: { type: string } }
      responses:
        '101': { description: Switching Protocols (WebSocket) }
        '401': { description: Authentication required or failed }

  /messages/{messageID}/reactions:
    post:
      tags: [messages]
      summary: Add an emoji reaction (idempotent)
      parameters:
        - { name: messageID, in: path, required: true, schema: { type: string, format: uuid } }
