# Production overlay: terminates TLS 1.3 at the edge, enforces the production
# runtime, and hardens every container (read-only root FS, dropped Linux
# capabilities, no privilege escalation, resource limits). Apply on top of the
# base file:
#
#   scripts/gen-dev-certs.sh                # or provide real CA certs
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Requires certificates in deploy/nginx/certs/{fullchain.pem,privkey.pem}.
services:
  postgres:
    # Postgres manages its own writable data volume and needs a handful of
    # privileged operations at init (chown/setuid on the data dir), so it keeps
    # a read-write root FS; we still forbid privilege escalation and cap it.
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits: { cpus: '1.0', memory: 1G }

  redis:
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 256M }

  backend:
    # Pull the published image instead of building. KISY_IMAGE_PREFIX and
    # KISY_VERSION are set by the deploy pipeline; they default to a local
    # build tag so `docker compose build` still works ad hoc.
    image: ${KISY_IMAGE_PREFIX:-kisy}/backend:${KISY_VERSION:-latest}
    environment:
      APP_ENV: production
      # In production, migrations are applied out-of-band, not on boot.
    # The Go binary is static, runs as non-root, and writes nothing to disk
    # (attachments/avatars live in Postgres) — so the whole root FS is
    # read-only with just a small tmpfs for scratch.
    read_only: true
    tmpfs:
      - /tmp:size=64m
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits: { cpus: '1.0', memory: 512M }

  frontend:
    image: ${KISY_IMAGE_PREFIX:-kisy}/frontend:${KISY_VERSION:-latest}
    # nginx-unprivileged serves static files; give it writable scratch for its
    # cache/pid and drop everything else.
    read_only: true
    tmpfs:
      - /tmp:size=16m
      - /var/cache/nginx:size=16m
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 128M }

  coturn:
    read_only: true
    tmpfs:
      - /var/tmp:size=16m
    cap_drop: [ALL]
    # Binding the TURN listener ports needs the net-bind capability back.
    cap_add: [NET_BIND_SERVICE]
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 256M }

  nginx:
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/nginx.tls.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    # The stock nginx image runs its master as root to bind :80/:443, so it
    # keeps only NET_BIND_SERVICE; workers still drop privileges. Read-only
    # root FS with tmpfs for the pid file and proxy cache.
    read_only: true
    tmpfs:
      - /tmp:size=16m
      - /var/cache/nginx:size=32m
      - /var/run:size=1m
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, CHOWN, SETUID, SETGID]
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 128M }
