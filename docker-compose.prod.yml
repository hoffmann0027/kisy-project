# Production overlay: terminates TLS 1.3 at the edge and enforces the
# production runtime. Apply on top of the base file:
#
#   scripts/gen-dev-certs.sh                # or provide real CA certs
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Requires certificates in deploy/nginx/certs/{fullchain.pem,privkey.pem}.
services:
  backend:
    environment:
      APP_ENV: production
      # In production, migrations are applied out-of-band, not on boot.

  nginx:
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/nginx.tls.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
