name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint · test · scan · build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kisy
          POSTGRES_USER: kisy
          POSTGRES_PASSWORD: ci_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kisy -d kisy"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Verify formatting
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then echo "gofmt needs to run on:"; echo "$fmt"; exit 1; fi

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race ./...

      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgres://kisy:ci_password@localhost:5432/kisy?sslmode=disable
        run: go test -tags integration ./...

      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Build
        run: go build -trimpath ./...

  frontend:
    name: Frontend (typecheck · build · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=high

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: kisy-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: kisy-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
