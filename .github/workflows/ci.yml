name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint · test · scan · build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kisy
          POSTGRES_USER: kisy
          POSTGRES_PASSWORD: ci_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kisy -d kisy"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Verify formatting
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then echo "gofmt needs to run on:"; echo "$fmt"; exit 1; fi

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race ./...

      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgres://kisy:ci_password@localhost:5432/kisy?sslmode=disable
        run: go test -tags integration ./...

      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Build
        run: go build -trimpath ./...

  frontend:
    name: Frontend (typecheck · build · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Dependency audit (shipped deps only)
        # Dev-only test tooling (vitest/esbuild) is excluded — it never
        # ships in the production bundle.
        run: npm audit --omit=dev --audit-level=high

  security:
    name: Security (gitleaks · gosec · trivy config · SBOM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks scans the full commit history, not just HEAD.
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        # Pinned by digest: the scanner itself is supply-chain-sensitive.
        run: >-
          docker run --rm -v "$PWD:/repo"
          zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
          detect --source /repo --no-banner --redact

      - name: IaC / Dockerfile scan (trivy config)
        run: >-
          docker run --rm -v "$PWD:/repo"
          aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f
          config /repo --severity HIGH,CRITICAL --exit-code 1

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: SAST (gosec)
        working-directory: backend
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          "$(go env GOPATH)/bin/gosec" -quiet -exclude-generated ./...

      - name: SBOM (trivy cyclonedx)
        # Answers "are we affected?" in minutes during the next supply-chain
        # incident: the artifact lists every dependency of this commit.
        run: >-
          docker run --rm -v "$PWD:/repo"
          aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f
          fs /repo --format cyclonedx --output /repo/sbom.cdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 90

  docker:
    name: Docker images build & scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: kisy-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: kisy-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image vulnerability scan (trivy image)
        # CRITICAL + fixed-only keeps this actionable: an unfixed HIGH in the
        # base image would otherwise block every merge with no remedy.
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f \
            image --severity CRITICAL --ignore-unfixed --exit-code 1 kisy-backend:ci
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f \
            image --severity CRITICAL --ignore-unfixed --exit-code 1 kisy-frontend:ci
