# Render Blueprint — one-click deploy of the whole app on the free tier.
# In the Render dashboard: New → Blueprint → connect this repo. Render reads
# this file and provisions the web service, a PostgreSQL database and a
# Redis (Key Value) instance, wiring them together automatically.
#
# You only set BOOTSTRAP_CEO_PASSWORD (marked sync:false) in the dashboard
# during the first deploy. See docs/deploy-render.md.

services:
  - type: web
    name: kisy
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: RUN_MIGRATIONS
        value: "true"
      - key: LOG_LEVEL
        value: info
      # Secrets generated by Render (long, random) — never committed.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: IP_HASH_SALT
        generateValue: true
      # Managed add-ons wired automatically.
      - key: DATABASE_URL
        fromDatabase:
          name: kisy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kisy-redis
          property: connectionString
      # First CEO account, created when the users table is empty.
      - key: BOOTSTRAP_CEO_USERNAME
        value: ceo
      - key: BOOTSTRAP_CEO_PASSWORD
        sync: false # set this yourself in the dashboard on first deploy
      # Voice calls (WebRTC): public STUN lets most calls connect. Render's
      # free tier can't host coturn (no UDP), so for calls across strict/
      # symmetric NATs add a managed TURN service and set TURN_URLS / TURN_SECRET
      # in the dashboard. See docs/deploy-render.md.
      - key: STUN_URLS
        value: stun:stun.l.google.com:19302

  - type: redis
    name: kisy-redis
    plan: free
    ipAllowList: [] # reachable only from Render services (no public access)
    maxmemoryPolicy: noeviction

databases:
  - name: kisy-db
    plan: free
    databaseName: kisy
    user: kisy
