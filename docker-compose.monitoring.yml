# Observability overlay: Prometheus scrapes the backend's /metrics and
# Grafana visualizes it. Apply alongside the base stack:
#
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# Prometheus: http://localhost:9090  ·  Grafana: http://localhost:3000
services:
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - kisy-net

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - kisy-net

volumes:
  prometheus-data:
  grafana-data:
