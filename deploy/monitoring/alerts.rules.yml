groups:
  - name: availability
    rules:
      - alert: BackendDown
        expr: up{job="kisy-backend"} == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "Backend is down"
          description: "Prometheus cannot scrape the backend ({{ $labels.instance }}) for 1m."

      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "PostgreSQL is down"
          description: "postgres-exporter cannot reach PostgreSQL for 1m."

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "Redis is down"
          description: "redis-exporter cannot reach Redis for 1m."

      - alert: NodeExporterDown
        expr: up{job="node"} == 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Host metrics unavailable"
          description: "node-exporter is unreachable for 5m — disk/CPU/memory alerting is blind."

      - alert: ReadinessFailing
        # Black-box probe of /ready: catches 503 (Postgres/Redis unreachable)
        # even while /metrics itself still answers.
        expr: probe_success{instance="http://backend:8080/ready"} == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Backend /ready is failing"
          description: "The readiness probe has been non-2xx for 2m — a dependency (DB/cache) is unhealthy."

  - name: http
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(kisy_http_requests_total{status=~"5.."}[5m]))
            / sum(rate(kisy_http_requests_total[5m])) > 0.05
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "Elevated 5xx rate"
          description: "More than 5% of requests are 5xx over the last 5m."

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(kisy_http_request_duration_seconds_bucket[5m]))) > 0.2
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "p95 latency above 200ms"
          description: "Request p95 latency has exceeded the 200ms target for 10m."

  - name: saturation
    rules:
      - alert: LowDisk
        # Critical: a full Postgres data disk takes the whole site down. See O5.
        expr: |
          node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint="/"}
            / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint="/"} < 0.15
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "Low disk space on host root"
          description: "Less than 15% free on {{ $labels.mountpoint }} for 5m."

      - alert: PostgresConnectionsHigh
        expr: |
          sum(pg_stat_database_numbackends) / max(pg_settings_max_connections) > 0.8
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Postgres near max_connections"
          description: "Active backends exceed 80% of max_connections for 5m."

      - alert: DBPoolSaturation
        expr: |
          max(kisy_db_pool_acquired_conns) / max(kisy_db_pool_max_conns) > 0.8
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Backend DB pool near exhaustion"
          description: "Over 80% of the pgx pool is checked out for 5m (see O3)."

  - name: workers
    rules:
      - alert: WorkerErrorsSpike
        expr: increase(kisy_worker_errors_total[15m]) > 3
        for: 0m
        labels: { severity: warning }
        annotations:
          summary: "Background worker failing"
          description: "Worker {{ $labels.worker }} logged >3 failed passes in 15m."
