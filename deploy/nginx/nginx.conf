# Edge reverse proxy: single entrypoint routing to the frontend static
# bundle and the backend API/WebSocket. TLS termination, CSP, HSTS and
# rate limiting are added in the security-hardening stage
# (docs/spec/06-security.md) — this is the plain-HTTP routing foundation.

upstream frontend_upstream {
    server frontend:80;
}

upstream backend_upstream {
    server backend:8080;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    location /health {
        proxy_pass http://backend_upstream;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
    }
}
