# Edge reverse proxy: single entrypoint routing to the frontend static
# bundle and the backend API/WebSocket, hardened per docs/spec/06-security.md.
# Plain HTTP here; the TLS 1.3 terminating variant is deploy/nginx/nginx.tls.conf,
# enabled in production via docker-compose.prod.yml.

# --- rate limiting (per client IP) ---
# Auth endpoints are the brute-force surface and are limited tightly;
# general API traffic gets a looser ceiling. The backend also enforces
# per-IP limits in Redis (defense in depth across instances).
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_status 429;

# Hide nginx version in error pages and the Server header.
server_tokens off;

# gzip for text assets.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript
    application/x-javascript text/xml application/xml image/svg+xml;

upstream frontend_upstream {
    server frontend:8080;
}

upstream backend_upstream {
    server backend:8080;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;
    client_body_timeout 15s;
    client_header_timeout 15s;

    # Do not leak upstream identifying headers.
    proxy_hide_header X-Powered-By;

    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    location /health {
        access_log off;
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
    }

    # Frontend static bundle. Security headers are applied here (the
    # backend sets its own on /api, /ws and /health responses, so adding
    # them again would duplicate).
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' ws: wss:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    }
}
