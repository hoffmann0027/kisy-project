# TLS 1.3 terminating edge for production (docs/spec/06-security.md:
# "TLS 1.3 only. HSTS. Perfect Forward Secrecy."). Mount certificates at
# /etc/nginx/certs/{fullchain.pem,privkey.pem} and enable via
# docker-compose.prod.yml. Generate dev certs with scripts/gen-dev-certs.sh.

limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_status 429;

server_tokens off;

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript
    application/x-javascript text/xml application/xml image/svg+xml;

upstream frontend_upstream {
    server frontend:80;
}

upstream backend_upstream {
    server backend:8080;
}

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    server_name _;
    return 308 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # TLS 1.3 only; PFS is inherent to the TLS 1.3 cipher suites.
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 25m;
    client_body_timeout 15s;
    client_header_timeout 15s;

    proxy_hide_header X-Powered-By;

    # HSTS on every response (two years, preload-eligible).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /ws {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
    }

    location /health {
        access_log off;
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' ws: wss:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    }
}
