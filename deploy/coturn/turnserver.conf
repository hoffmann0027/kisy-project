# coturn TURN/STUN server for KISY 1:1 audio calls.
#
# The shared secret is NOT stored here — it is passed at launch via
# --static-auth-secret=${TURN_SECRET} (and --realm=${TURN_REALM}) from the
# environment, so no secret is committed to the repo. Clients receive only
# short-lived credentials the backend derives from that secret (TURN REST API),
# which coturn validates because "use-auth-secret" is enabled below.

listening-port=3478

# Time-limited (REST API) credentials: username = "<expiry>:<userId>",
# password = base64(HMAC-SHA1(secret, username)). Matches calls.Service.ICEConfig.
use-auth-secret

# Relay port range (must be published by the container in docker-compose).
min-port=49160
max-port=49200

fingerprint
stale-nonce=600

# Dev/plain deployment: no TLS/DTLS certs. Terminate TLS at the edge in prod.
no-tls
no-dtls

# Lock down: no admin CLI, and never relay to internal/loopback ranges.
no-cli
no-multicast-peers
denied-peer-ip=0.0.0.0-0.0.0.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
