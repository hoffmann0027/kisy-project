<!doctype html>
<html lang="ru" data-theme="glass">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <!-- Apply the persisted theme before first paint to avoid a flash of the
         default theme for returning users (mirrors useThemeStore, key
         kisy-theme). -->
    <script>
      try {
        var t = JSON.parse(localStorage.getItem("kisy-theme") || "null");
        var theme = (t && t.state && t.state.theme) || "glass";
        if (["glass", "luce", "aurora"].indexOf(theme) === -1) theme = "glass";
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {}
    </script>
    <meta name="description" content="KISY — корпоративный мессенджер" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KISY" />
    <title>KISY</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
