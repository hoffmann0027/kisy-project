server {
    # 8080: the unprivileged nginx image cannot bind ports below 1024.
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Build assets are content-hashed (index-<hash>.js/.css) — cache them
    # hard so returning visitors don't refetch unchanged bundles.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # The HTML shell and the service worker are NOT hashed: they point at
    # whichever asset hashes the latest build produced. They must always be
    # revalidated, otherwise a browser serves a stale index.html that still
    # references the previous deploy's bundles and updates never take effect.
    # no-cache still allows efficient 304s via ETag.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # Branding icons at the root have STABLE names (favicon.png, logo.png,
    # icon-*.png, apple-touch-icon.png, manifest). They change in place on a
    # rebrand, so they must revalidate rather than be pinned by the browser —
    # otherwise an updated logo never appears. no-cache still allows 304s.
    location ~* ^/(favicon\.png|logo\.png|apple-touch-icon\.png|icon-.*\.png|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
