server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Build assets are content-hashed (index-<hash>.js/.css) — cache them
    # hard so returning visitors don't refetch unchanged bundles.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # The HTML shell and the service worker are NOT hashed: they point at
    # whichever asset hashes the latest build produced. They must always be
    # revalidated, otherwise a browser serves a stale index.html that still
    # references the previous deploy's bundles and updates never take effect.
    # no-cache still allows efficient 304s via ETag.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
